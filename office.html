<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手仕舞い報告 — 管理画面</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg:#f0ede6; --surface:#fff; --border:#ddd8ce;
  --text:#1a1a1a; --muted:#8a8070;
  --accent:#2b4c8c; --al:#e8edf7;
  --success:#27695a;
  --shadow:0 2px 12px rgba(0,0,0,.07); --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}

/* ===================== LOGIN ===================== */
#loginScreen {
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#0f1d3a 0%,#1a2f5e 50%,#0d2247 100%);
  display:flex;align-items:center;justify-content:center;
}
#loginScreen::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(74,127,212,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(74,127,212,.06) 1px,transparent 1px);background-size:48px 48px;}
.lg-card{position:relative;z-index:2;width:100%;max-width:420px;margin:20px;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:44px 40px 40px;box-shadow:0 32px 64px rgba(0,0,0,.4);animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lg-logo{text-align:center;margin-bottom:32px;}
.lg-mark{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#2b5bb8,#4a7fd4);font-size:24px;font-weight:900;color:#fff;margin-bottom:12px;box-shadow:0 8px 24px rgba(74,127,212,.35);}
.lg-co{font-size:11px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.15em;text-transform:uppercase;}
.lg-title{font-size:19px;font-weight:900;color:#fff;margin-top:3px;}
.lg-role{display:inline-block;margin-top:8px;background:rgba(74,127,212,.3);color:rgba(255,255,255,.7);font-size:10px;font-weight:700;padding:3px 10px;border-radius:50px;letter-spacing:.1em;}
.lg-fields{display:flex;flex-direction:column;gap:14px;}
.lg-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.lg-input-wrap{position:relative;}
.lg-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.4;pointer-events:none;}
.lg-input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);border-radius:10px;padding:13px 13px 13px 40px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:500;color:#fff;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;}
.lg-input::placeholder{color:rgba(255,255,255,.2);font-size:14px;}
.lg-input:focus{border-color:#4a7fd4;background:rgba(74,127,212,.1);box-shadow:0 0 0 3px rgba(74,127,212,.2);}
.lg-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:15px;padding:0;}
.lg-btn{width:100%;margin-top:8px;background:linear-gradient(135deg,#2b5bb8,#4a7fd4);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:900;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(43,91,184,.45);transition:opacity .15s;}
.lg-btn:active{opacity:.88;}
.lg-err{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff8a7a;text-align:center;display:none;margin-top:4px;}
.lg-err.show{display:block;animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.lg-footer{margin-top:22px;text-align:center;font-size:10px;color:rgba(255,255,255,.18);line-height:1.6;}
.lg-spinner{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===================== APP ===================== */
#app{display:none;}
body.logged-in #loginScreen{display:none;}
body.logged-in #app{display:block;}

body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{background:var(--accent);color:#fff;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(43,76,140,.25);position:sticky;top:0;z-index:100;}
.hdr-left .co{font-size:11px;opacity:.6;letter-spacing:.06em;}
.hdr-left .ttl{font-size:18px;font-weight:900;letter-spacing:.04em;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.hdate{font-family:'Share Tech Mono',monospace;font-size:13px;opacity:.75;}
.btn-excel{background:var(--success);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-logout{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:7px 14px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.layout{display:flex;height:calc(100vh - 52px);}
.left{width:340px;min-width:340px;background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;}
.ltoolbar{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:9px;}
.toolbar-top{display:flex;align-items:center;justify-content:space-between;}
.toolbar-lbl{font-size:13px;font-weight:900;}
.cnt{background:var(--al);color:var(--accent);font-size:11px;font-weight:900;padding:3px 10px;border-radius:50px;}
.srow{display:flex;gap:7px;}
.sinput{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:7px 11px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);outline:none;}
.sinput:focus{border-color:var(--accent);}
.sselect{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:7px 9px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text);outline:none;cursor:pointer;min-width:80px;}
.lscroll{flex:1;overflow-y:auto;}
.dlabel{padding:7px 14px 5px;font-size:10px;font-weight:900;color:var(--muted);letter-spacing:.1em;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.rrow{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;gap:11px;}
.rrow:hover{background:#f8f6f2;}
.rrow.active{background:var(--al);border-left:3px solid var(--accent);padding-left:11px;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--al);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--accent);flex-shrink:0;}
.rinfo{flex:1;min-width:0;}
.rname{font-size:14px;font-weight:700;}
.rids{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rtime{font-size:11px;color:var(--muted);margin-top:2px;}
.rbadge{font-size:10px;font-weight:900;padding:2px 7px;border-radius:50px;background:#e6f4f0;color:var(--success);flex-shrink:0;margin-top:3px;}
.right{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:16px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;padding:80px 0;}
.empty-icon{font-size:52px;opacity:.35;}
.empty-text{font-size:15px;font-weight:500;}
.dheader{display:flex;justify-content:space-between;align-items:flex-start;}
.dtitle{font-size:22px;font-weight:900;}
.dmeta{font-size:13px;color:var(--muted);margin-top:4px;}
.btn-print{background:transparent;border:1.5px solid var(--border);border-radius:7px;padding:7px 14px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
.btn-print:hover{border-color:var(--accent);color:var(--accent);}
.entries-wrap{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.eline{display:flex;align-items:baseline;gap:14px;padding:11px 16px;border-bottom:1px solid var(--border);}
.eline:last-child{border-bottom:none;}
.eline-id{font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);letter-spacing:.08em;white-space:nowrap;flex-shrink:0;}
.eline-text{font-size:13px;color:var(--text);line-height:1.5;}

@media print {
  #loginScreen,
  .hdr,
  .btn-print,
  .dheader .btn-print{display:none!important;}
  .left{display:none!important;}
  .layout{display:block!important;height:auto!important;}
  .right{padding:20px 28px!important;overflow:visible!important;gap:10px!important;}
  .dheader{margin-bottom:8px!important;}
  .dtitle{font-size:20px!important;}
  .dmeta{display:none!important;}
  .entries-wrap{box-shadow:none!important;border:none!important;border-radius:0!important;}
  .eline{padding:6px 0!important;border-bottom:0.5px solid #eee!important;break-inside:avoid;}
  .eline:last-child{border-bottom:none!important;}
  .eline-id{font-size:14px!important;}
  .eline-text{font-size:13px!important;}
  body{background:#fff!important;}
}
</style>
</head>

    <span class="hdate" id="todayDate"></span>
<button class="btn-excel" onclick="exportExcel()">📥 Excelで保存</button>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </div>
</div>

<div class="layout">
  <div class="left">
    <div class="ltoolbar">
      <div class="toolbar-top">
        <span class="toolbar-lbl">受信した報告</span>
        <span class="cnt" id="cnt">0件</span>
      </div>
      <div class="srow">
        <input class="sinput" type="text" id="sq" placeholder="入庫NOで検索" oninput="doFilter()">
        <select class="sselect" id="sd" onchange="doFilter()">
          <option value="">全日付</option>
        </select>
      </div>
    </div>
    <div class="lscroll" id="listWrap"></div>
  </div>
  <div class="right" id="rightPanel">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-text">左のリストから報告を選択してください</div>
    </div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ===== USERS =====
const USERS = {
  'epishko.jp@gmail.com': 'kaneki2024',
  'office@kaneki.jp':     'kaneki2024',
};

// ===== LOGIN =====
function toggleLgPass(){
  const i=document.getElementById('lgPass'),b=document.getElementById('lgToggle');
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁':'🙈';
}

function doLogin(){
  const email=document.getElementById('lgEmail').value.trim().toLowerCase();
  const pass=document.getElementById('lgPass').value;
  if(!email||!pass){showLgErr('メールアドレスとパスワードを入力してください');return;}
  document.getElementById('lgBtnText').textContent='確認中...';
  document.getElementById('lgSpinner').style.display='block';
  document.getElementById('lgBtn').style.opacity='.7';
  document.getElementById('lgBtn').style.pointerEvents='none';
  setTimeout(()=>{
    document.getElementById('lgBtnText').textContent='ログイン';
    document.getElementById('lgSpinner').style.display='none';
    document.getElementById('lgBtn').style.opacity='1';
    document.getElementById('lgBtn').style.pointerEvents='auto';
    if(USERS[email]&&USERS[email]===pass){
      localStorage.setItem('office_user',email);
      document.body.classList.add('logged-in');
      initApp();
    }else{showLgErr('メールアドレスまたはパスワードが違います');}
  },800);
}

function showLgErr(msg){const e=document.getElementById('lgErr');e.textContent=msg;e.classList.add('show');}

function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  localStorage.removeItem('office_user');
  document.body.classList.remove('logged-in');
  document.getElementById('lgEmail').value='';
  document.getElementById('lgPass').value='';
  document.getElementById('lgErr').classList.remove('show');
}

window.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('office_user')){
    document.body.classList.add('logged-in');
    initApp();
  }
});

// ===== SUPABASE =====
const SB_URL = 'https://iffoirsptormcutghzxx.supabase.co';
const SB_KEY = 'sb_publishable_7qGblCk5hUK_n8xpFM1KJA_sLbIWGXq';

let allReports = [];
let activeKey = null; // "date__name"

async function fetchReports(){
  try{
    const res = await fetch(`${SB_URL}/rest/v1/reports?order=id.asc&limit=500`,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    const data = await res.json();
    if(Array.isArray(data)){
      allReports = data.map(r=>({
        id: r.id,
        date: r.date,
        name: r.name,
        time: r.ts ? r.ts.slice(0,16).replace('T',' ') : '',
        entries: Array.isArray(r.entries) ? r.entries : [],
      }));
      refreshList();
    }
  }catch(e){console.warn('fetch error',e);}
}

function initApp(){
  const now=new Date();
  document.getElementById('todayDate').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  fetchReports();
  setInterval(fetchReports, 30000);
}

function refreshList(){
  // Update date filter options
  const sel=document.getElementById('sd');
  const prevDate=sel.value;
  // Collect unique dates sorted newest first
  const dates=[...new Set(allReports.map(r=>r.date))].reverse();
  sel.innerHTML='<option value="">全日付</option>';
  dates.forEach(d=>{
    const o=document.createElement('option');o.value=d;o.textContent=d;
    if(d===prevDate)o.selected=true;
    sel.appendChild(o);
  });
  doFilter();
}

function doFilter(){
  const q=document.getElementById('sq').value.toLowerCase();
  const d=document.getElementById('sd').value;
  const filtered=allReports.filter(r=>
    (!d||r.date===d)&&
    (!q||r.entries.some(e=>e.no&&e.no.toLowerCase().includes(q)))
  );
  renderList(filtered);
}

// Group by date (newest first) → then by name → show as one row per person per day
function renderList(data){
  const wrap=document.getElementById('listWrap');
  wrap.innerHTML='';

  if(!data.length){
    wrap.innerHTML=`<div style="padding:36px;text-align:center;color:var(--muted);font-size:13px;">報告はありません</div>`;
    document.getElementById('cnt').textContent='0件';
    return;
  }

  // Group by date
  const dateMap={};
  data.forEach(r=>{
    if(!dateMap[r.date]) dateMap[r.date]=[];
    dateMap[r.date].push(r);
  });

  // Sort dates newest first
  // Sort dates newest first — parse Japanese date like "3月13日" or use id order
  const sortedDates=Object.keys(dateMap).sort((a,b)=>{
    // Try to extract month/day numbers for comparison
    const pa=a.match(/(\d+)月(\d+)日/), pb=b.match(/(\d+)月(\d+)日/);
    if(pa&&pb){
      const ma=parseInt(pa[1]),da=parseInt(pa[2]),mb=parseInt(pb[1]),db=parseInt(pb[2]);
      return mb!==ma ? mb-ma : db-da;
    }
    return b.localeCompare(a);
  });
  let totalStacks=0;

  sortedDates.forEach(date=>{
    const reps=dateMap[date];

    // Group by name within this date
    const nameMap={};
    reps.forEach(r=>{
      if(!nameMap[r.name]) nameMap[r.name]=[];
      nameMap[r.name].push(r);
    });

    const lbl=document.createElement('div');
    lbl.className='dlabel';
    lbl.textContent='📅 '+date;
    wrap.appendChild(lbl);

    Object.keys(nameMap).forEach(name=>{
      const stack=nameMap[name]; // all reports by this person on this date
      const key=date+'__'+name;
      totalStacks++;

      // Collect all entries and all IDs across all reports
      const allEntries=stack.flatMap(r=>r.entries);
      const allNos=allEntries.map(e=>e.no).filter(Boolean);
      // First send time (oldest first since order=id.asc)
      const firstTime=stack[0].time;
      const lastTime=stack[stack.length-1].time;
      const timeStr=stack.length>1?`${firstTime} 〜 ${lastTime}`:firstTime;

      const row=document.createElement('div');
      row.className='rrow'+(key===activeKey?' active':'');
      row.id='stack-'+key.replace(/[^a-zA-Z0-9]/g,'_');
      row.innerHTML=`
        <div class="avatar">${name?name[0]:'?'}</div>
        <div class="rinfo">
          <div class="rname">${name}</div>
          <div class="rids">${allNos.join('　')||'—'}</div>
          <div class="rtime">${timeStr}　${allEntries.length}件</div>
        </div>
        <div class="rbadge">受信済</div>`;
      row.onclick=()=>openStack(key, date, name, stack);
      wrap.appendChild(row);
    });
  });

  document.getElementById('cnt').textContent=totalStacks+'件';
}

function openStack(key, date, name, stack){
  activeKey=key;
  document.querySelectorAll('.rrow').forEach(r=>r.classList.remove('active'));
  const rowEl=document.getElementById('stack-'+key.replace(/[^a-zA-Z0-9]/g,'_'));
  if(rowEl) rowEl.classList.add('active');

  // Show all reports oldest→newest on right panel
  const allEntries=stack.flatMap(r=>r.entries);
  const firstTime=stack[0].time;
  const lastTime=stack[stack.length-1].time;
  const timeStr=stack.length>1?`${firstTime} 〜 ${lastTime}`:firstTime;

  document.getElementById('rightPanel').innerHTML=`
    <div class="dheader">
      <div>
        <div class="dtitle">${name}<span style="font-size:15px;color:var(--muted);font-weight:500;font-family:'Share Tech Mono',monospace;margin-left:10px;">${date}</span></div>
        <div class="dmeta">受信時刻：${timeStr}　／　全${allEntries.length}件　（${stack.length}回送信）</div>
      </div>
      <button class="btn-print" onclick="window.print()">🖨 印刷</button>
    </div>
    <div class="entries-wrap">${allEntries.map(e=>buildLine(e)).join('')}</div>`;
}

function exportExcel(){
  const d = document.getElementById('sd').value;
  const q = document.getElementById('sq').value.toLowerCase();
  const filtered = allReports.filter(r=>
    (!d||r.date===d) &&
    (!q||r.entries.some(e=>e.no&&e.no.toLowerCase().includes(q)))
  );

  if(!filtered.length){ alert('データがありません'); return; }

  const n = v => (+v||0) || '';

  // Header rows
  const header1 = ['金木　手仕舞い報告'];
  const header2 = [
    '入庫NO.', '山積済',
    '良品_個', '良品_枚',
    'ダメージ_個', 'ダメージ_枚',
    'シミ_個', 'シミ_枚',
    '選別なし_個', '選別なし_枚',
    '不足(枚)',
    'サイズ(mm)', 'T', 'G', 'F', 'メモ',
    '名前', '日付', '送信時刻'
  ];

  const rows = [header2];

  // Sort by date asc, then time asc
  const sorted = [...filtered].sort((a,b)=> a.id - b.id);

  sorted.forEach(rep => {
    rep.entries.forEach(e => {
      rows.push([
        e.no || '',
        n(e.yama),
        n(e.ryohin?.ko), n(e.ryohin?.mai),
        n(e.damage?.ko),  n(e.damage?.mai),
        n(e.shimi?.ko),   n(e.shimi?.mai),
        n(e.senbetsu?.ko),n(e.senbetsu?.mai),
        n(e.fusoku),
        e.biko?.size || '', e.biko?.t || '', e.biko?.g || '', e.biko?.f || '', e.biko?.memo || '',
        rep.name, rep.date, rep.time
      ]);
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:12},{wch:8},
    {wch:8},{wch:8},
    {wch:10},{wch:10},
    {wch:8},{wch:8},
    {wch:10},{wch:10},
    {wch:8},
    {wch:10},{wch:5},{wch:5},{wch:5},{wch:16},
    {wch:12},{wch:10},{wch:18}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '手仕舞い報告');

  const filename = d ? `手仕舞い報告_${d}.xlsx` : `手仕舞い報告_全件.xlsx`;
  XLSX.writeFile(wb, filename);
}

function buildLine(e){
  const n=v=>+v||0,pts=[];
  if(e.yama)pts.push(e.yama+'山');
  const rk=n(e.ryohin?.ko),rm=n(e.ryohin?.mai);if(rk||rm){let s='良品 ';if(rk)s+=rk+'個';if(rm)s+='/'+rm+'枚';pts.push(s);}
  const dk=n(e.damage?.ko),dm=n(e.damage?.mai);if(dk||dm){let s='ダメージ ';if(dk)s+=dk+'個';if(dm)s+='/'+dm+'枚';pts.push(s);}
  const sk=n(e.shimi?.ko),sm=n(e.shimi?.mai);if(sk||sm){let s='シミ ';if(sk)s+=sk+'個';if(sm)s+='/'+sm+'枚';pts.push(s);}
  const sbk=n(e.senbetsu?.ko),sbm=n(e.senbetsu?.mai);if(sbk||sbm){let s='選別なし ';if(sbk)s+=sbk+'個';if(sbm)s+='/'+sbm+'枚';pts.push(s);}
  if(n(e.fusoku))pts.push('不足 '+e.fusoku+'枚');
  const tgf=[e.biko?.t,e.biko?.g,e.biko?.f].filter(Boolean).join('-');
  const biko=[e.biko?.size?e.biko.size+'mm':'',tgf,e.biko?.memo].filter(Boolean).join(' ');
  if(biko)pts.push(biko);
  return`<div class="eline"><span class="eline-id">${e.no}</span><span class="eline-text">${pts.join('　')||'（詳細なし）'}</span></div>`;
}
</script>
</body>
</html>
