<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2b4c8c">
<meta name="apple-mobile-web-app-title" content="手仕舞い報告">
<title>手仕舞い報告</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg:#f5f3ee; --surface:#fff; --border:#d4cfc5;
  --text:#1a1a1a; --muted:#8a8070;
  --accent:#2b4c8c; --al:#e8edf7;
  --danger:#c0392b; --dl:#fdecea;
  --success:#27695a;
  --shadow:0 2px 12px rgba(0,0,0,.08); --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ===================== LOGIN SCREEN ===================== */
#loginScreen {
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#0f1d3a 0%,#1a2f5e 50%,#0d2247 100%);
  display:flex;align-items:center;justify-content:center;
}
#loginScreen::before {
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(74,127,212,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(74,127,212,.06) 1px,transparent 1px);
  background-size:48px 48px;
}
.lg-card {
  position:relative;z-index:2;
  width:100%;max-width:400px;margin:20px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:44px 36px 40px;
  box-shadow:0 32px 64px rgba(0,0,0,.4);
  animation:fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lg-logo{text-align:center;margin-bottom:32px;}
.lg-mark{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#2b5bb8,#4a7fd4);font-size:24px;font-weight:900;color:#fff;margin-bottom:12px;box-shadow:0 8px 24px rgba(74,127,212,.35);}
.lg-co{font-size:11px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.15em;text-transform:uppercase;}
.lg-title{font-size:19px;font-weight:900;color:#fff;margin-top:3px;letter-spacing:.04em;}
.lg-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;letter-spacing:.08em;}
.lg-fields{display:flex;flex-direction:column;gap:14px;}
.lg-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.lg-input-wrap{position:relative;}
.lg-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.4;pointer-events:none;}
.lg-input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);border-radius:10px;padding:13px 13px 13px 40px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:500;color:#fff;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;}
.lg-input::placeholder{color:rgba(255,255,255,.2);font-size:14px;}
.lg-input:focus{border-color:#4a7fd4;background:rgba(74,127,212,.1);box-shadow:0 0 0 3px rgba(74,127,212,.2);}
.lg-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:15px;padding:0;}
.lg-btn{width:100%;margin-top:8px;background:linear-gradient(135deg,#2b5bb8,#4a7fd4);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:900;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(43,91,184,.45);transition:opacity .15s;}
.lg-btn:active{opacity:.88;}
.lg-err{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff8a7a;text-align:center;display:none;margin-top:4px;}
.lg-err.show{display:block;animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.lg-footer{margin-top:22px;text-align:center;font-size:10px;color:rgba(255,255,255,.18);line-height:1.6;}
.lg-spinner{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===================== APP ===================== */
#app{display:none;}
body.logged-in #loginScreen{display:none;}
body.logged-in #app{display:block;}

body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
.hdr{background:var(--accent);color:#fff;padding:14px 18px 11px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(43,76,140,.3);}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.co{font-size:11px;font-weight:500;opacity:.7;}
.ht{font-size:20px;font-weight:900;letter-spacing:.04em;}
.hdate{font-family:'Share Tech Mono',monospace;font-size:14px;opacity:.85;}
.huser{font-size:12px;opacity:.7;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.3);}
.huser:hover{background:rgba(255,255,255,.1);}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:2px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:10px;font-weight:700;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;border-top:3px solid transparent;margin-top:-2px;transition:color .15s;position:relative;}
.ni{font-size:22px;line-height:1;}
.nb.active{color:var(--accent);border-top-color:var(--accent);}
.nbadge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--danger);color:#fff;font-size:9px;font-weight:900;border-radius:50px;padding:1px 5px;min-width:15px;text-align:center;display:none;}
.scr{display:none;} .scr.active{display:block;}
.pad{padding:14px;display:flex;flex-direction:column;gap:12px;}
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.ch{background:var(--accent);color:#fff;padding:9px 14px;font-size:12px;font-weight:700;letter-spacing:.08em;}
.cb{padding:14px;display:flex;flex-direction:column;gap:12px;}
.fl{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin-bottom:5px;}
input[type=text],input[type=number]{width:100%;font-family:'Noto Sans JP',sans-serif;font-size:20px;font-weight:700;color:var(--text);background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:11px 12px;outline:none;transition:border-color .15s,background .15s;-webkit-appearance:none;}
input:focus{border-color:var(--accent);background:var(--al);}
input.cid{font-family:'Share Tech Mono',monospace;font-size:24px;letter-spacing:.12em;text-transform:uppercase;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.crow{display:flex;gap:6px;align-items:center;}
.crow input{flex:1;text-align:center;padding:10px 6px;font-size:22px;}
.unit{font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap;}
.sep{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.1em;border-bottom:1px solid var(--border);padding-bottom:3px;margin-top:2px;}
.ec{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.eh{background:#eeeae2;padding:9px 13px;display:flex;justify-content:space-between;align-items:center;}
.en{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;}
.brm{background:none;border:none;color:var(--danger);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
.eb{padding:13px;display:flex;flex-direction:column;gap:11px;}
.badd{width:100%;background:transparent;border:2px dashed var(--border);border-radius:10px;padding:14px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.badd:active{background:var(--al);border-color:var(--accent);color:var(--accent);}
.btn{width:100%;border:none;border-radius:12px;padding:16px;font-family:'Noto Sans JP',sans-serif;font-size:17px;font-weight:900;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s;}
.btn:active{transform:scale(.97);}
.btn-green{background:var(--success);color:#fff;box-shadow:0 3px 14px rgba(39,105,90,.3);}
.btn-blue{background:var(--accent);color:#fff;box-shadow:0 3px 14px rgba(43,76,140,.35);}
.btn:disabled{opacity:.5;pointer-events:none;}
.daybar{background:var(--al);border-radius:var(--r);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;}
.daybar-lbl{font-size:13px;font-weight:700;color:var(--accent);}
.daybar-cnt{font-size:22px;font-weight:900;color:var(--accent);}
.drow{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:11px 12px;display:flex;align-items:flex-start;gap:8px;}
.drow-info{flex:1;min-width:0;}
.drow-id{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:.08em;}
.drow-line{font-size:12px;color:var(--text);margin-top:3px;line-height:1.5;word-break:break-all;}
.drow-acts{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.bedit{background:var(--al);color:var(--accent);border:none;border-radius:7px;padding:7px 11px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.bdel{background:var(--dl);color:var(--danger);border:none;border-radius:7px;padding:7px 11px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.hgroup{display:flex;flex-direction:column;gap:8px;}
.hgroup-lbl{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.1em;padding:4px 2px;}
.hrep{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.hrep-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.hrep-title{font-size:15px;font-weight:700;color:var(--text);}
.hrep-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.hchev{font-size:18px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.hchev.open{transform:rotate(90deg);}
.hrep-body{display:none;border-top:1px solid var(--border);}
.hrep-body.open{display:block;}
.hentry{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;}
.hentry-info{flex:1;min-width:0;}
.hentry-id{font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);}
.hentry-line{font-size:11px;color:var(--text);margin-top:2px;line-height:1.5;word-break:break-all;}
.hentry-acts{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.hfooter{padding:11px 13px;background:#f8f7f4;border-top:1px solid var(--border);display:flex;gap:8px;}
.bresend{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.bdelrep{background:var(--dl);color:var(--danger);border:none;border-radius:8px;padding:10px 13px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;}
.moverlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:18px 15px 40px;display:flex;flex-direction:column;gap:12px;}
.modal-title{font-size:16px;font-weight:900;color:var(--accent);display:flex;justify-content:space-between;align-items:center;}
.bclose{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;}
.toast{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--success);color:#fff;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sending-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.sending-overlay.show{display:flex;}
.sending-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
.sending-text{color:#fff;font-size:16px;font-weight:700;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .ei{font-size:48px;margin-bottom:10px;}
.empty p{font-size:15px;font-weight:500;line-height:1.6;}
</style>
</head>

<script>

const EMAILJS_PUBLIC_KEY  = 'sA1osWajaPbAHcnuI';
const EMAILJS_SERVICE_ID  = 'service_wdbyd8m';
const EMAILJS_TEMPLATE_ID = 'template_3dpphtg';

// ===== USERS (for test) =====
// email: password
const USERS = {
  'epishko.jp@gmail.com': 'kaneki2024',

};

emailjs.init(EMAILJS_PUBLIC_KEY);

// ===== LOGIN =====
function toggleLgPass(){
  const i=document.getElementById('lgPass'),b=document.getElementById('lgToggle');
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁':'🙈';
}

function doLogin(){
  const email=document.getElementById('lgEmail').value.trim().toLowerCase();
  const pass=document.getElementById('lgPass').value;
  if(!email||!pass){showLgErr('メールアドレスとパスワードを入力してください');return;}

  document.getElementById('lgBtnText').textContent='確認中...';
  document.getElementById('lgSpinner').style.display='block';
  document.getElementById('lgBtn').style.opacity='.7';
  document.getElementById('lgBtn').style.pointerEvents='none';

  setTimeout(()=>{
    document.getElementById('lgBtnText').textContent='ログイン';
    document.getElementById('lgSpinner').style.display='none';
    document.getElementById('lgBtn').style.opacity='1';
    document.getElementById('lgBtn').style.pointerEvents='auto';

    if(USERS[email] && USERS[email]===pass){
      localStorage.setItem('tj_user', email);
      document.body.classList.add('logged-in');
      document.getElementById('huser').textContent = email.split('@')[0];
      initApp();
    } else {
      showLgErr('メールアドレスまたはパスワードが違います');
    }
  }, 800);
}

function showLgErr(msg){
  const e=document.getElementById('lgErr');
  e.textContent=msg;e.classList.add('show');
}

function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  localStorage.removeItem('tj_user');
  document.body.classList.remove('logged-in');
  document.getElementById('lgEmail').value='';
  document.getElementById('lgPass').value='';
  document.getElementById('lgErr').classList.remove('show');
}

// Auto-login if saved
window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('tj_user');
  if(saved){
    document.body.classList.add('logged-in');
    document.getElementById('huser').textContent=saved.split('@')[0];
    initApp();
  }
});

// ===== APP DATA =====
let dayList=[], history=[], fEntries=[], fCount=0, editTarget=null;

function initApp(){
  dayList  = JSON.parse(localStorage.getItem('tj_day')  || '[]');
  history  = JSON.parse(localStorage.getItem('tj_hist') || '[]');
  fEntries=[]; fCount=0;
  document.getElementById('fEntries').innerHTML='';
  const now=new Date();
  document.getElementById('f_month').value=now.getMonth()+1;
  document.getElementById('f_day').value=now.getDate();
  document.getElementById('hdate').textContent=`${now.getMonth()+1}月 ${now.getDate()}日`;
  addEntry(); renderDay(); renderHist(); updBadge();
}

function goTo(name){
  ['form','day','hist'].forEach(n=>{
    document.getElementById('scr-'+n).classList.toggle('active',n===name);
    document.getElementById('nb-'+n).classList.toggle('active',n===name);
  });
  if(name==='day') renderDay();
  if(name==='hist') renderHist();
}

  const p=pre||{};

  d.className='ec'; d.id=id;

      </div>
      <div class="sep">山積済</div>

      <div class="sep">良品</div>
      <div class="cg">
        <div><div class="fl">個数</div><div class="crow"><input type="number" id="${id}_rk" placeholder="0" min="0" value="${p.ryohin?.ko||''}" style="text-align:center;"><span class="unit">個</span></div></div>
        <div><div class="fl">枚数</div><div class="crow"><input type="number" id="${id}_rm" placeholder="0" min="0" value="${p.ryohin?.mai||''}" style="text-align:center;"><span class="unit">枚</span></div></div>
      </div>
      <div class="sep">ダメージ</div>
      <div class="cg">
        <div><div class="fl">個数</div><div class="crow"><input type="number" id="${id}_dk" placeholder="0" min="0" value="${p.damage?.ko||''}" style="text-align:center;"><span class="unit">個</span></div></div>
        <div><div class="fl">枚数</div><div class="crow"><input type="number" id="${id}_dm" placeholder="0" min="0" value="${p.damage?.mai||''}" style="text-align:center;"><span class="unit">枚</span></div></div>
      </div>
      <div class="sep">シミ</div>
      <div class="cg">
        <div><div class="fl">個数</div><div class="crow"><input type="number" id="${id}_sk" placeholder="0" min="0" value="${p.shimi?.ko||''}" style="text-align:center;"><span class="unit">個</span></div></div>
        <div><div class="fl">枚数</div><div class="crow"><input type="number" id="${id}_sm" placeholder="0" min="0" value="${p.shimi?.mai||''}" style="text-align:center;"><span class="unit">枚</span></div></div>
      </div>
      <div class="sep">選別なし分</div>
      <div class="cg">
        <div><div class="fl">個数</div><div class="crow"><input type="number" id="${id}_sbk" placeholder="0" min="0" value="${p.senbetsu?.ko||''}" style="text-align:center;"><span class="unit">個</span></div></div>
        <div><div class="fl">枚数</div><div class="crow"><input type="number" id="${id}_sbm" placeholder="0" min="0" value="${p.senbetsu?.mai||''}" style="text-align:center;"><span class="unit">枚</span></div></div>
      </div>
      <div class="sep">不足</div>
      <div class="crow"><input type="number" id="${id}_fu" placeholder="0" min="0" value="${p.fusoku||''}" style="text-align:center;max-width:140px;"><span class="unit">枚</span></div>
      <div class="sep">備考</div>
      <div style="display:flex;gap:5px;align-items:flex-end;">
        <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">サイズ</span><input type="text" id="${id}_bs" placeholder="5.5" value="${p.biko?.size||''}" style="width:62px;text-align:center;font-size:18px;padding:10px 4px;"></div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">T</span><input type="text" id="${id}_bt" placeholder="0" value="${p.biko?.t||''}" style="width:52px;text-align:center;font-size:18px;padding:10px 4px;"></div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">G</span><input type="text" id="${id}_bg" placeholder="0" value="${p.biko?.g||''}" style="width:52px;text-align:center;font-size:18px;padding:10px 4px;"></div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">F</span><input type="text" id="${id}_bf" placeholder="0" value="${p.biko?.f||''}" style="width:52px;text-align:center;font-size:18px;padding:10px 4px;"></div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;"><span style="font-size:11px;font-weight:700;color:var(--muted);">メモ</span><input type="text" id="${id}_bm" placeholder="メモ" value="${p.biko?.memo||''}" style="font-size:18px;padding:10px 10px;"></div>
      </div>
    </div>`;
  document.getElementById('fEntries').appendChild(d);
  setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

function rmEntry(id){
  if(fEntries.length<=1){showToast('⚠ 最低1つ必要です','#c0392b');return;}
  fEntries=fEntries.filter(e=>e!==id);
  document.getElementById(id)?.remove();
}

function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}

function collectEntry(id){
  return{no:gv(id+'_no'),yama:gv(id+'_ya'),
    ryohin:{ko:gv(id+'_rk'),mai:gv(id+'_rm')},
    damage:{ko:gv(id+'_dk'),mai:gv(id+'_dm')},
    shimi:{ko:gv(id+'_sk'),mai:gv(id+'_sm')},
    senbetsu:{ko:gv(id+'_sbk'),mai:gv(id+'_sbm')},
    fusoku:gv(id+'_fu'),
    biko:{size:gv(id+'_bs'),t:gv(id+'_bt'),g:gv(id+'_bg'),f:gv(id+'_bf'),memo:gv(id+'_bm')}
  };
}

function saveToList(){
  const month=gv('f_month'),day=gv('f_day'),name=gv('f_name');
  if(!month||!day||!name){showToast('⚠ 月・日・名前を入力してください','#c0392b');return;}
  let added=0;
  for(const id of fEntries){const e=collectEntry(id);if(!e.no)continue;dayList.push({entry:e,month,day,name,uid:Date.now()+Math.random()});added++;}
  if(!added){showToast('⚠ 入庫NOを入力してください','#c0392b');return;}
  persist();updBadge();showToast(`✓ ${added}件をリストに追加しました`);
  fEntries=[];fCount=0;document.getElementById('fEntries').innerHTML='';addEntry();
}

function makeLine(e){
  const pts=[];
  if(e.yama)pts.push(`${e.yama}山`);
  const rk=+e.ryohin?.ko||0,rm=+e.ryohin?.mai||0;
  if(rk||rm){let s='良品 ';if(rk)s+=`${rk}個`;if(rm)s+=`/${rm}枚`;pts.push(s);}
  const dk=+e.damage?.ko||0,dm=+e.damage?.mai||0;
  if(dk||dm){let s='ダメージ ';if(dk)s+=`${dk}個`;if(dm)s+=`/${dm}枚`;pts.push(s);}
  const sk=+e.shimi?.ko||0,sm=+e.shimi?.mai||0;
  if(sk||sm){let s='シミ ';if(sk)s+=`${sk}個`;if(sm)s+=`/${sm}枚`;pts.push(s);}
  const sbk=+e.senbetsu?.ko||0,sbm=+e.senbetsu?.mai||0;
  if(sbk||sbm){let s='選別なし ';if(sbk)s+=`${sbk}個`;if(sbm)s+=`/${sbm}枚`;pts.push(s);}
  if(+e.fusoku)pts.push(`不足 ${e.fusoku}枚`);
  const tgf=[e.biko?.t,e.biko?.g,e.biko?.f].filter(Boolean).join('-');
  const biko=[e.biko?.size?(e.biko.size+'mm'):'',tgf,e.biko?.memo].filter(Boolean).join(' ');
  if(biko)pts.push(biko);
  return pts.join('　');
}

function renderDay(){
  const wrap=document.getElementById('dayItems');wrap.innerHTML='';
  document.getElementById('dayCnt').textContent=dayList.length;
  document.getElementById('sendWrap').style.display=dayList.length?'block':'none';
  if(dayList.length){const d=dayList[0];document.getElementById('dayLabel').textContent=`${d.month}月${d.day}日　${d.name}`;}
  else document.getElementById('dayLabel').textContent='本日のリスト';
  if(!dayList.length){wrap.innerHTML=`<div class="empty"><div class="ei">📋</div><p>まだ入庫がありません<br>入力画面から追加してください</p></div>`;return;}
  dayList.forEach((item,idx)=>{
    const e=item.entry,line=makeLine(e);
    const d=document.createElement('div');d.className='drow';
    d.innerHTML=`<div class="drow-info"><div class="drow-id">${e.no}</div><div class="drow-line">${line||'（詳細なし）'}</div></div>
      <div class="drow-acts"><button class="bedit" onclick="openEdit('day',${idx})">編集</button><button class="bdel" onclick="delDay(${idx})">削除</button></div>`;
    wrap.appendChild(d);
  });
}

function delDay(idx){if(!confirm('この入庫を削除しますか？'))return;dayList.splice(idx,1);persist();updBadge();renderDay();}

function buildText(rep){
  const lines=[`【手仕舞い報告】`,`日付：${rep.date}　担当：${rep.name}`,`送信：${rep.ts}`,`件数：${rep.entries.length}件`,`─────────────────────`];
  rep.entries.forEach((e,i)=>lines.push(`${i+1}. ${e.no}　${makeLine(e)}`));
  lines.push('─────────────────────');
  return lines.join('\n');
}

async function sendReport(){
  if(!dayList.length)return;
  const first=dayList[0];
  const rep={id:Date.now(),date:`${first.month}月${first.day}日`,name:first.name,entries:dayList.map(i=>i.entry),ts:new Date().toLocaleString('ja-JP')};
  document.getElementById('sendingOverlay').classList.add('show');
  document.getElementById('sendBtn').disabled=true;
  try{
    await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{
      to_email:REPORT_TO_EMAIL,
      subject:`【手仕舞い報告】${rep.date} 担当：${rep.name}`,
      report_date:rep.date,staff_name:rep.name,send_time:rep.ts,
      entry_count:rep.entries.length+'件',report_body:buildText(rep),
    });
    history.unshift(rep);if(history.length>100)history.pop();
    localStorage.setItem('tj_hist',JSON.stringify(history));
    dayList=[];persist();updBadge();
    document.getElementById('sendingOverlay').classList.remove('show');
    showToast('✓ 報告を送信しました');renderDay();
  }catch(err){
    document.getElementById('sendingOverlay').classList.remove('show');
    document.getElementById('sendBtn').disabled=false;
    showToast('⚠ 送信に失敗しました','#c0392b');
  }
}

function renderHist(){
  const wrap=document.getElementById('histItems');wrap.innerHTML='';
  if(!history.length){wrap.innerHTML=`<div class="empty"><div class="ei">📭</div><p>送信済みの報告はありません</p></div>`;return;}
  const groups={};
  history.forEach(r=>{(groups[r.date]||(groups[r.date]=[])).push(r);});
  Object.keys(groups).forEach(date=>{
    const grp=document.createElement('div');grp.className='hgroup';
    const lbl=document.createElement('div');lbl.className='hgroup-lbl';lbl.textContent=`📅 ${date}`;grp.appendChild(lbl);
    groups[date].forEach(rep=>{
      const ids=rep.entries.map(e=>e.no).join('、');
      const rdiv=document.createElement('div');rdiv.className='hrep';
      rdiv.innerHTML=`<div class="hrep-head" onclick="toggleRep(this)">
        <div><div class="hrep-title">${rep.name}　<span style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);">${rep.entries.length}件</span></div>
        <div class="hrep-sub">${ids}</div></div><span class="hchev">›</span></div>
        <div class="hrep-body">
          ${rep.entries.map((e,idx)=>`<div class="hentry"><div class="hentry-info"><div class="hentry-id">${e.no}</div><div class="hentry-line">${makeLine(e)||'（詳細なし）'}</div></div>
            <div class="hentry-acts"><button class="bedit" onclick="openEdit('hist',${idx},${rep.id})">編集</button><button class="bdel" onclick="delHistEntry(${rep.id},${idx})">削除</button></div></div>`).join('')}
          <div class="hfooter"><button class="bresend" onclick="resendReport(${rep.id})">📤 再送信</button><button class="bdelrep" onclick="delReport(${rep.id})">報告を削除</button></div>
        </div>`;
      grp.appendChild(rdiv);
    });
    wrap.appendChild(grp);
  });
}

function toggleRep(head){const body=head.nextElementSibling,chev=head.querySelector('.hchev');body.classList.toggle('open');chev.classList.toggle('open');}
function delHistEntry(repId,idx){if(!confirm('この入庫を削除しますか？'))return;const r=history.find(h=>h.id===repId);if(!r)return;r.entries.splice(idx,1);if(!r.entries.length)history=history.filter(h=>h.id!==repId);localStorage.setItem('tj_hist',JSON.stringify(history));renderHist();}
function delReport(repId){if(!confirm('この報告をすべて削除しますか？'))return;history=history.filter(h=>h.id!==repId);localStorage.setItem('tj_hist',JSON.stringify(history));renderHist();}

async function resendReport(repId){
  const rep=history.find(h=>h.id===repId);if(!rep)return;
  document.getElementById('sendingOverlay').classList.add('show');
  try{
    await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{to_email:REPORT_TO_EMAIL,subject:`【再送】手仕舞い報告 ${rep.date} 担当：${rep.name}`,report_date:rep.date,staff_name:rep.name,send_time:rep.ts,entry_count:rep.entries.length+'件',report_body:buildText(rep)});
    document.getElementById('sendingOverlay').classList.remove('show');showToast('✓ 再送信しました');
  }catch(err){document.getElementById('sendingOverlay').classList.remove('show');showToast('⚠ 送信に失敗しました','#c0392b');}
}

function openEdit(src,idx,repId){
  let e;
  if(src==='day')e=dayList[idx].entry;
  else{const r=history.find(h=>h.id===repId);e=r?.entries[idx];}
  if(!e)return;
  editTarget={src,idx,repId};buildModal(e);
  document.getElementById('modal').classList.add('open');
}

function buildModal(e){
  document.getElementById('mFields').innerHTML=`
    <div><div class="fl">入庫NO.</div><input class="cid" type="text" id="m_no" value="${e.no||''}" maxlength="9" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9\\-]/g,'')"></div>
    <div class="sep">山積済</div><div class="crow"><input type="number" id="m_ya" value="${e.yama||''}" placeholder="0" min="0" style="text-align:center;max-width:160px;"><span class="unit">山</span></div>
    <div class="sep">良品</div><div class="cg"><div><div class="fl">個数</div><div class="crow"><input type="number" id="m_rk" value="${e.ryohin?.ko||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">個</span></div></div><div><div class="fl">枚数</div><div class="crow"><input type="number" id="m_rm" value="${e.ryohin?.mai||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">枚</span></div></div></div>
    <div class="sep">ダメージ</div><div class="cg"><div><div class="fl">個数</div><div class="crow"><input type="number" id="m_dk" value="${e.damage?.ko||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">個</span></div></div><div><div class="fl">枚数</div><div class="crow"><input type="number" id="m_dm" value="${e.damage?.mai||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">枚</span></div></div></div>
    <div class="sep">シミ</div><div class="cg"><div><div class="fl">個数</div><div class="crow"><input type="number" id="m_sk" value="${e.shimi?.ko||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">個</span></div></div><div><div class="fl">枚数</div><div class="crow"><input type="number" id="m_sm" value="${e.shimi?.mai||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">枚</span></div></div></div>
    <div class="sep">選別なし分</div><div class="cg"><div><div class="fl">個数</div><div class="crow"><input type="number" id="m_sbk" value="${e.senbetsu?.ko||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">個</span></div></div><div><div class="fl">枚数</div><div class="crow"><input type="number" id="m_sbm" value="${e.senbetsu?.mai||''}" placeholder="0" min="0" style="text-align:center;"><span class="unit">枚</span></div></div></div>
    <div class="sep">不足</div><div class="crow"><input type="number" id="m_fu" value="${e.fusoku||''}" placeholder="0" min="0" style="text-align:center;max-width:140px;"><span class="unit">枚</span></div>
    <div class="sep">備考</div>
    <div style="display:flex;gap:5px;align-items:flex-end;">
      <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">サイズ</span><input type="text" id="m_bs" value="${e.biko?.size||''}" placeholder="5.5" style="width:62px;text-align:center;font-size:18px;padding:10px 4px;"></div>
      <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">T</span><input type="text" id="m_bt" value="${e.biko?.t||''}" placeholder="0" style="width:52px;text-align:center;font-size:18px;padding:10px 4px;"></div>
      <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">G</span><input type="text" id="m_bg" value="${e.biko?.g||''}" placeholder="0" style="width:52px;text-align:center;font-size:18px;padding:10px 4px;"></div>
      <div style="display:flex;flex-direction:column;gap:4px;flex:0 0 auto;"><span style="font-size:11px;font-weight:700;color:var(--muted);">F</span><input type="text" id="m_bf" value="${e.biko?.f||''}" placeholder="0" style="width:52px;text-align:center;font-size:18px;padding:10px 4px;"></div>
      <div style="display:flex;flex-direction:column;gap:4px;flex:1;"><span style="font-size:11px;font-weight:700;color:var(--muted);">メモ</span><input type="text" id="m_bm" value="${e.biko?.memo||''}" placeholder="メモ" style="font-size:18px;padding:10px 10px;"></div>
    </div>`;
}

function mv(id){const e=document.getElementById(id);return e?e.value.trim():'';}

function saveModal(){
  const updated={no:mv('m_no'),yama:mv('m_ya'),ryohin:{ko:mv('m_rk'),mai:mv('m_rm')},damage:{ko:mv('m_dk'),mai:mv('m_dm')},shimi:{ko:mv('m_sk'),mai:mv('m_sm')},senbetsu:{ko:mv('m_sbk'),mai:mv('m_sbm')},fusoku:mv('m_fu'),biko:{size:mv('m_bs'),t:mv('m_bt'),g:mv('m_bg'),f:mv('m_bf'),memo:mv('m_bm')}};
  if(!updated.no){showToast('⚠ 入庫NOを入力してください','#c0392b');return;}
  if(editTarget.src==='day'){dayList[editTarget.idx].entry=updated;persist();renderDay();}
  else{const r=history.find(h=>h.id===editTarget.repId);if(r)r.entries[editTarget.idx]=updated;localStorage.setItem('tj_hist',JSON.stringify(history));renderHist();}
  closeModal();showToast('✓ 保存しました');
}

function closeModal(){document.getElementById('modal').classList.remove('open');editTarget=null;}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function persist(){localStorage.setItem('tj_day',JSON.stringify(dayList));}
function updBadge(){const b=document.getElementById('badge');b.textContent=dayList.length;b.style.display=dayList.length?'inline':'none';}
function showToast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'var(--success)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
